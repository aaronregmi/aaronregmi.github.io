<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link id="dynamic-favicon" rel="icon" type="image/png" href="/images/arlogo.png">
    
    <script>
    function applyBrandMode() {
        const mode = localStorage.getItem("brandMode") || "normal";
        const favicon = document.getElementById("dynamic-favicon");
    
        if (mode === "alt") {
            document.title = "Home - Melbourne High School";
            favicon.href = "/images/mhs-icon.png";
        } else {
            document.title = "Among Us";
            favicon.href = "/images/arlogo.png";
        }
    }
    
    applyBrandMode();
</script>
    <style>
        html, body {
            margin: 0;
            height: 100%;
        }

        iframe {
            width: 100vw;    /* full width of viewport */
            height: 100vh;   /* full height of viewport */
            border: 0;
        }
    </style>
</head>
<body>
    <iframe src="https://77pen.github.io/p/among-us" allowfullscreen></iframe>
</body>
</html>
