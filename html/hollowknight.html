<!DOCTYPE html>
<html lang="en">
<head>
<link id="dynamic-favicon" rel="icon" type="image/png" href="/images/arlogo.png">

<script>
function applyBrandMode() {
    const mode = localStorage.getItem("brandMode") || "normal";
    const favicon = document.getElementById("dynamic-favicon");

    if (mode === "alt") {
        document.title = "Home - Melbourne High School";
        favicon.href = "images/mhs-icon.png?v=1";
    } else {
        document.title = "Aaron Regmi Games";
        favicon.href = "images/arlogo.png?v=1";
    }
}
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
}
iframe {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    border: none;
}
#truffled-logo {
    position: fixed;
    bottom: 10px;
    right: 10px;
    width: 150px;
    height: 150px;
    cursor: pointer;
    z-index: 9999;
}
</style>
</head>
<body>
<iframe src="https://truffled.lol/games/hollowknight/index.html" allowfullscreen></iframe>
<a href="https://truffled.lol" target="_blank">
    <img id="truffled-logo" src="https://truffled.lol/png/logo.png" alt="Logo">
</a>

</body>
</html>
